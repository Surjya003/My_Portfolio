<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Signal Lost | Surjya Kamal Saha</title>
  <meta name="theme-color" content="#0a0a0a">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="shortcut icon" href="./assets/images/logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">

  <style>
    body {
      background-color: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      margin: 0;
    }
    /* Fixed film grain matching index.html */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)"/></svg>');
      opacity: 0.04;
      pointer-events: none;
      z-index: 9999;
    }

    .error-container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
    }
    .error-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      font-family: monospace;
      font-size: 0.8rem;
      color: #10b981;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 10px #10b981;
      animation: emerald-pulse 2s infinite;
    }
    @keyframes emerald-pulse {
      0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      50% { transform: scale(1.1); opacity: 0.8; box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
      background: linear-gradient(to bottom, #fff, rgba(255, 255, 255, 0.3));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.1rem;
      max-width: 400px;
      margin: 0 auto 32px;
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1.6;
    }
    .btn-return {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      background: #fff;
      color: #000;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 600;
      font-size: 1.1rem;
      border-radius: 999px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-return:hover {
      background: #10b981;
      color: #000;
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
      transform: translateY(-4px);
    }
  </style>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>
  
  <main class="error-container">
    <div class="error-badge">
      <span class="status-dot"></span> ERROR_404
    </div>
    
    <h1>Signal Lost</h1>
    
    <p>The coordinates you entered don't exist in this sector. The requested transmission could not be routed.</p>
    
    <a href="./index.html" class="btn-return">
      <ion-icon name="arrow-back-outline"></ion-icon>
      Return to Base
    </a>
  </main>

</body>
</html>
